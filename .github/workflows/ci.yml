name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  test:
    name: Build, tests, gate, and e2e smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.19.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck shared
        run: npm run build --workspace=packages/shared

      - name: Typecheck SDK
        run: npm run build --workspace=packages/sdk

      - name: Typecheck backend
        run: npm run build --workspace=packages/backend

      - name: Typecheck frontend
        run: npx tsc --noEmit --pretty false -p packages/frontend/tsconfig.json

      - name: Typecheck Electron
        run: npx tsc --noEmit --pretty false -p packages/electron/tsconfig.json

      - name: Typecheck VS Code extension
        run: npx tsc --noEmit --pretty false -p packages/vscode-extension/tsconfig.json

      - name: Run full build
        run: npm run build

      - name: Build VS Code webview assets
        run: npm run vscode:build

      - name: Run unit tests
        run: npm run test --workspaces --if-present

      - name: Run Product Graph quality gate
        run: npm run gate:check -- --mode hard --allow-empty

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Intent graph e2e smoke
        run: npx playwright test tests/e2e/runtime-flows.spec.ts -g "opens the intent graph"

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-artifacts
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7
